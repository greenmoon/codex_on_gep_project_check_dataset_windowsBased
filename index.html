<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A1886 GEP Dataset Checker V14 2026.06.24</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dde5;
      --blue: #1f64d1;
      --red: #cf2e2e;
      --green: #16803c;
      --focus: #0d9488;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 44px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .version {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: 285px minmax(0, 1fr);
      gap: 8px;
      padding: 8px;
      height: calc(100vh - 45px);
      overflow: hidden;
    }

    aside,
    .workspace {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    aside {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px;
      overflow: hidden;
    }

    .workspace {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 6px 8px;
      padding: 8px;
      border-bottom: 1px solid var(--line);
    }

    .control {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    label,
    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input,
    select,
    button {
      min-width: 0;
      font: inherit;
    }

    input[type="number"],
    input[type="text"],
    select {
      width: 100%;
      height: 28px;
      padding: 4px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--focus);
    }

    button {
      height: 28px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    button:hover,
    input:focus,
    select:focus {
      border-color: var(--focus);
      outline: none;
    }

    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }

    .segmented button {
      border: 0;
      border-radius: 0;
      background: #fff;
    }

    .segmented button.active {
      background: var(--focus);
      color: #fff;
    }

    .file-drop {
      display: grid;
      gap: 8px;
      padding: 8px;
      border: 1px dashed #aab3c2;
      border-radius: 8px;
      background: #fbfcfe;
      text-align: center;
    }

    .file-drop input {
      width: 100%;
    }

    .source-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .source-grid button.active {
      border-color: var(--focus);
      background: var(--focus);
      color: #fff;
    }

    textarea {
      width: 100%;
      min-height: 58px;
      max-height: 78px;
      resize: vertical;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font: inherit;
    }

    .hidden {
      display: none;
    }

    .meta {
      display: grid;
      gap: 6px;
      padding: 8px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      line-height: 1.35;
      word-break: break-word;
    }

    .checks {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .checks label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ink);
      font-weight: 400;
    }

    .chart-wrap {
      position: relative;
      min-height: 0;
      background: #fff;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .status {
      padding: 6px 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      min-height: 30px;
      max-height: 44px;
      overflow: hidden;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 10px 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .key {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .swatch {
      width: 18px;
      height: 3px;
      border-radius: 2px;
      background: currentColor;
    }

    @media (max-width: 900px) {
      body {
        overflow: auto;
      }

      main {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .controls {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .workspace {
        min-height: 560px;
      }
    }

    @media (max-width: 520px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>A1886 GEP Dataset Checker V14 2026.06.24</h1>
    <div class="version">Browser port of jb_A1886_GUItool_check_GEP_dataset_v07.py</div>
  </header>

  <main>
    <aside>
      <div class="control">
        <div class="label">Input Format</div>
        <div class="segmented" role="group" aria-label="Input format">
          <button id="fmtLog" type="button">LOG</button>
          <button id="fmtCsv" class="active" type="button">CSV</button>
        </div>
      </div>

      <div class="control">
        <div class="label">Dataset Source</div>
        <div class="source-grid" role="group" aria-label="Dataset source">
          <button id="sourceLocal" type="button">1 Local file</button>
          <button id="sourceRepo" type="button">2 GitHub file</button>
          <button id="sourceDropbox" type="button">3 Dropbox link</button>
          <button id="openAlgorithm" type="button">Show deglitch and rule01 algorithm</button>
        </div>
      </div>

      <div class="file-drop">
        <label id="sourceHint" class="hidden" for="fileInput"></label>
        <input id="fileInput" class="hidden" type="file" accept=".log,.txt,.json,.jsonl,.csv" multiple>
        <div id="dropboxPanel" class="hidden">
          <textarea id="dropboxLinks" placeholder="Paste Dropbox CSV/LOG link here. Curve loads automatically after paste."></textarea>
        </div>
      </div>

      <div class="control">
        <select id="fileSelect">
          <option value="">No files listed</option>
        </select>
      </div>

      <div class="checks">
        <label><input id="showR1" type="checkbox"> r1</label>
        <label><input id="showR2" type="checkbox"> r2</label>
        <label><input id="enableRule01" type="checkbox"> Enable rule01</label>
      </div>

      <div class="meta" id="infoBox">No file loaded.</div>
    </aside>

    <section class="workspace">
      <div class="controls">
        <div class="control">
          <label for="windowSize">Window size N</label>
          <input id="windowSize" type="number" min="10" max="100000" step="1" value="200">
        </div>
        <div class="control">
          <label for="startFn">Start fn</label>
          <input id="startFn" type="number" step="1" value="0">
        </div>
        <div class="control">
          <label for="frameMs">Frame tick</label>
          <input id="frameMs" type="number" min="1" max="10000" step="0.001" value="50.000">
        </div>
        <div class="control">
          <label for="medianWin">Median win</label>
          <input id="medianWin" type="number" min="3" max="31" step="2" value="9">
        </div>
        <div class="control">
          <label for="spikeTh">Spike TH m</label>
          <input id="spikeTh" type="number" min="0.01" max="1" step="0.001" value="0.065">
        </div>
        <div class="control">
          <label for="jumpTh">Jump TH m</label>
          <input id="jumpTh" type="number" min="0.01" max="1.5" step="0.001" value="0.253">
        </div>
        <div class="control">
          <label for="ruleBaseRangeTh">rule_base_range_TH</label>
          <input id="ruleBaseRangeTh" type="number" min="0.1" max="3" step="0.01" value="1.1">
        </div>
        <div class="control">
          <label for="ruleBaseRangeSlider">Rule TH slider</label>
          <input id="ruleBaseRangeSlider" type="range" min="0.1" max="3" step="0.01" value="1.1">
        </div>
        <div class="control" style="grid-column: span 2;">
          <label for="startSlider">Slide start fn</label>
          <input id="startSlider" type="range" min="0" max="0" step="1" value="0">
        </div>
      </div>

      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <div>
        <div class="legend">
          <span class="key" style="color: var(--blue);"><span class="swatch"></span>r0 raw</span>
          <span class="key" style="color: var(--red);"><span class="swatch"></span>r0_deglitch</span>
          <span class="key" style="color: #7c3aed;"><span class="swatch"></span>r1/r2 optional</span>
        </div>
        <div class="status" id="status">Ready.</div>
      </div>
    </section>
  </main>

  <script>
    const DEFAULTS = {
      medianWin: 9,
      spikeTh: 0.065,
      jumpTh: 0.253,
      ruleBaseRangeTh: 1.1,
      frameMs: 50.0,
      zoomIn: 0.8,
      zoomOut: 1.25,
      githubDefaultName: "to people80cm.csv",
      dropboxUrl: "https://www.dropbox.com/scl/fi/cvdagxn4nofgftcvhkgpc/to-people80cm.csv?rlkey=xf3w3yy7cpfbc4l2uemhri0vt&dl=0"
    };

    const state = {
      format: "LOG",
      fileName: "",
      records: [],
      firstFn: 0,
      lastFn: 0,
      selectedFn: null,
      selectedRatio: 0.5,
      current: { records: [], fns: [], r0s: [], deg: [] },
      parseInfo: {},
      source: "",
      listedFiles: []
    };

    const els = {
      fmtLog: document.getElementById("fmtLog"),
      fmtCsv: document.getElementById("fmtCsv"),
      sourceLocal: document.getElementById("sourceLocal"),
      sourceRepo: document.getElementById("sourceRepo"),
      sourceDropbox: document.getElementById("sourceDropbox"),
      openAlgorithm: document.getElementById("openAlgorithm"),
      sourceHint: document.getElementById("sourceHint"),
      fileInput: document.getElementById("fileInput"),
      dropboxPanel: document.getElementById("dropboxPanel"),
      dropboxLinks: document.getElementById("dropboxLinks"),
      fileSelect: document.getElementById("fileSelect"),
      infoBox: document.getElementById("infoBox"),
      status: document.getElementById("status"),
      canvas: document.getElementById("chart"),
      windowSize: document.getElementById("windowSize"),
      startFn: document.getElementById("startFn"),
      frameMs: document.getElementById("frameMs"),
      medianWin: document.getElementById("medianWin"),
      spikeTh: document.getElementById("spikeTh"),
      jumpTh: document.getElementById("jumpTh"),
      ruleBaseRangeTh: document.getElementById("ruleBaseRangeTh"),
      ruleBaseRangeSlider: document.getElementById("ruleBaseRangeSlider"),
      startSlider: document.getElementById("startSlider"),
      showR1: document.getElementById("showR1"),
      showR2: document.getElementById("showR2"),
      enableRule01: document.getElementById("enableRule01")
    };

    const ctx = els.canvas.getContext("2d");
    let plotBox = null;

    function setFormat(format) {
      state.format = format;
      els.fmtLog.classList.toggle("active", format === "LOG");
      els.fmtCsv.classList.toggle("active", format === "CSV");
    }

    function setSource(source) {
      state.source = source;
      els.sourceLocal.classList.toggle("active", source === "local");
      els.sourceRepo.classList.toggle("active", source === "repo");
      els.sourceDropbox.classList.toggle("active", source === "dropbox");
      els.fileInput.classList.toggle("hidden", source !== "local");
      els.dropboxPanel.classList.toggle("hidden", source !== "dropbox");
    }

    function extFormat(name) {
      return String(name).toLowerCase().endsWith(".csv") ? "CSV" : "LOG";
    }

    function isDatasetName(name) {
      return /\.(csv|log|txt|json|jsonl)$/i.test(String(name || ""));
    }

    function setListedFiles(files, hint) {
      state.listedFiles = files.filter((item) => isDatasetName(item.name || item.path || item.url));
      els.fileSelect.innerHTML = "";
      if (!state.listedFiles.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No files found";
        els.fileSelect.appendChild(opt);
      } else {
        state.listedFiles.forEach((item, index) => {
          const opt = document.createElement("option");
          opt.value = String(index);
          opt.textContent = `${item.name} (${item.format || extFormat(item.name)})`;
          els.fileSelect.appendChild(opt);
        });
      }
      els.sourceHint.textContent = hint || "";
    }

    function selectListedFileByName(name) {
      const target = String(name || "").trim().toLowerCase();
      const index = state.listedFiles.findIndex((item) => String(item.name || "").trim().toLowerCase() === target);
      if (index >= 0) {
        els.fileSelect.value = String(index);
        return true;
      }
      return false;
    }

    function dropboxRawUrl(url) {
      const trimmed = String(url || "").trim();
      if (!trimmed) return "";
      try {
        const u = new URL(trimmed);
        if (u.hostname.includes("dropbox.com")) {
          u.searchParams.set("dl", "1");
          u.searchParams.delete("raw");
          return u.toString();
        }
      } catch (_err) {
        return trimmed;
      }
      return trimmed;
    }

    function dropboxDownloadHostUrl(url) {
      const raw = dropboxRawUrl(url);
      try {
        const u = new URL(raw);
        if (u.hostname.includes("dropbox.com")) {
          u.hostname = "dl.dropboxusercontent.com";
          u.searchParams.delete("dl");
          return u.toString();
        }
      } catch (_err) {
        return raw;
      }
      return raw;
    }

    function allOriginsUrl(url) {
      return `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
    }

    async function fetchTextFromUrl(url, source) {
      const urls = source === "dropbox"
        ? [
            dropboxRawUrl(url),
            dropboxDownloadHostUrl(url),
            allOriginsUrl(dropboxDownloadHostUrl(url)),
            allOriginsUrl(dropboxRawUrl(url))
          ]
        : [url];
      const tried = [];

      for (const candidate of urls) {
        if (!candidate || tried.includes(candidate)) continue;
        tried.push(candidate);
        try {
          const response = await fetch(candidate, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          if (/^\s*<!doctype html/i.test(text) || /^\s*<html[\s>]/i.test(text)) {
            throw new Error("received HTML instead of dataset text");
          }
          return text;
        } catch (err) {
          if (candidate === urls[urls.length - 1]) {
            throw new Error(`${err.message}; tried ${tried.length} URL form(s)`);
          }
        }
      }

      throw new Error("no readable URL available");
    }

    let dropboxLoadTimer = null;

    function scheduleDropboxLoad() {
      if (state.source !== "dropbox") setSource("dropbox");
      window.clearTimeout(dropboxLoadTimer);
      dropboxLoadTimer = window.setTimeout(() => {
        listDropboxFiles(true);
      }, 500);
    }

    async function fetchRepoFiles(autoOpen = false) {
      setSource("repo");
      els.sourceHint.textContent = "";
      try {
        const response = await fetch("files.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const files = (data.files || []).map((item) => ({
          name: item.name,
          url: item.path || item.url || item.name,
          format: item.format || extFormat(item.name),
          source: "repo"
        }));
        setListedFiles(files, "");
        selectListedFileByName(DEFAULTS.githubDefaultName);
        if (autoOpen && state.listedFiles.length) await openSelectedFile();
      } catch (err) {
        setListedFiles([], `Could not load repo manifest files.json: ${err.message}`);
      }
    }

    async function listDropboxFiles(autoOpen = false) {
      setSource("dropbox");
      const rawLines = els.dropboxLinks.value.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!rawLines.length) {
        setListedFiles([], "Paste a Dropbox shared CSV/LOG link first.");
        return;
      }

      if (rawLines.length === 1 && /files\.json(\?|$)/i.test(rawLines[0])) {
        try {
          const response = await fetch(dropboxRawUrl(rawLines[0]), { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const data = await response.json();
          const files = (data.files || []).map((item) => ({
            name: item.name || item.path || item.url,
            url: dropboxRawUrl(item.url || item.path || item.name),
            format: item.format || extFormat(item.name || item.path || item.url),
            source: "dropbox"
          }));
          setListedFiles(files, `${files.length} Dropbox manifest files listed. Select one to show curve.`);
          if (autoOpen && files.length) await openSelectedFile();
          return;
        } catch (err) {
          setListedFiles([], `Could not load Dropbox manifest: ${err.message}`);
          return;
        }
      }

      const files = rawLines.map((url) => {
        const clean = dropboxRawUrl(url);
        let name = clean === dropboxRawUrl(DEFAULTS.dropboxUrl)
          ? "to-people80cm.csv"
          : clean.split("?")[0].split("/").filter(Boolean).pop() || clean;
        try {
          name = decodeURIComponent(name);
        } catch (_err) {
          // Keep the URL tail as-is if decoding fails.
        }
        return { name, url: clean, format: extFormat(name), source: "dropbox" };
      });
      setListedFiles(files, `${files.length} Dropbox links listed. Select one to show curve.`);
      if (autoOpen && files.length) await openSelectedFile();
    }

    function parseLog(text) {
      const byFn = new Map();
      for (const line of text.split(/\r?\n/)) {
        const s = line.trim();
        if (!s.startsWith("{")) continue;
        const match = s.match(/\{.*?\}/);
        if (!match) continue;
        try {
          const d = JSON.parse(match[0]);
          if (d.fn === undefined || d.r0 === undefined) continue;
          const rec = {
            fn: Number.parseInt(d.fn, 10),
            r0: Number(d.r0),
            r1: d.r1 === undefined || d.r1 === null || d.r1 === "" ? null : Number(d.r1),
            r2: d.r2 === undefined || d.r2 === null || d.r2 === "" ? null : Number(d.r2)
          };
          if (Number.isFinite(rec.fn) && Number.isFinite(rec.r0)) byFn.set(rec.fn, rec);
        } catch (_err) {
          continue;
        }
      }
      state.parseInfo = { mode: "LOG", fn_key: "fn", r0_key: "r0", r1_key: "r1", r2_key: "r2" };
      return Array.from(byFn.keys()).sort((a, b) => a - b).map((fn) => byFn.get(fn));
    }

    function parseCsvLine(line) {
      const out = [];
      let cur = "";
      let quoted = false;
      for (let i = 0; i < line.length; i += 1) {
        const ch = line[i];
        if (ch === "\"") {
          if (quoted && line[i + 1] === "\"") {
            cur += "\"";
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (ch === "," && !quoted) {
          out.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      out.push(cur);
      return out;
    }

    function firstExistingKey(headers, candidates) {
      const lowerToReal = new Map(headers.map((h) => [String(h).trim().toLowerCase(), String(h).trim()]));
      for (const c of candidates) {
        const key = String(c).trim().toLowerCase();
        if (lowerToReal.has(key)) return lowerToReal.get(key);
      }
      return null;
    }

    function parseCsv(text) {
      const lines = text.replace(/^\uFEFF/, "").split(/\r?\n/).filter((line) => line.trim() !== "");
      if (!lines.length) return [];
      const headers = parseCsvLine(lines[0]).map((h) => h.trim());
      const fnKey = firstExistingKey(headers, ["fn", "frame", "frame_number", "frame_id"]);
      const r0Key = firstExistingKey(headers, ["r0_raw", "r0", "r0_hampel_gate", "r0_filtered_ewma", "range0", "range_0"]);
      const r1Key = firstExistingKey(headers, ["r1", "range1", "range_1"]);
      const r2Key = firstExistingKey(headers, ["r2", "range2", "range_2"]);
      const pcTimeKey = firstExistingKey(headers, ["pc_time", "time", "timestamp", "datetime"]);

      state.parseInfo = {
        mode: "CSV",
        fn_key: String(fnKey),
        r0_key: String(r0Key),
        r1_key: String(r1Key),
        r2_key: String(r2Key),
        pc_time_key: String(pcTimeKey)
      };

      if (!fnKey || !r0Key) {
        throw new Error(`CSV missing required columns. Need fn and r0/r0_raw. Found columns: ${headers.join(", ")}`);
      }

      const index = Object.fromEntries(headers.map((h, i) => [h, i]));
      const byFn = new Map();
      let autoFn = 0;
      for (let i = 1; i < lines.length; i += 1) {
        const row = parseCsvLine(lines[i]);
        try {
          const fnText = String(row[index[fnKey]] ?? "").trim();
          const fn = fnText === "" ? autoFn : Number.parseInt(Number(fnText), 10);
          const r0 = Number(String(row[index[r0Key]] ?? "").trim());
          const r1Text = r1Key ? String(row[index[r1Key]] ?? "").trim() : "";
          const r2Text = r2Key ? String(row[index[r2Key]] ?? "").trim() : "";
          const rec = {
            fn,
            r0,
            r1: r1Text === "" ? null : Number(r1Text),
            r2: r2Text === "" ? null : Number(r2Text)
          };
          if (Number.isFinite(rec.fn) && Number.isFinite(rec.r0)) byFn.set(rec.fn, rec);
        } catch (_err) {
          // Keep browser behavior aligned with the PyQt tool: skip malformed rows.
        }
        autoFn += 1;
      }
      return Array.from(byFn.keys()).sort((a, b) => a - b).map((fn) => byFn.get(fn));
    }

    function forceOddMedianWin(value) {
      let v = Math.max(3, Math.min(31, Number.parseInt(value, 10) || DEFAULTS.medianWin));
      if (v % 2 === 0) v = v < 31 ? v + 1 : v - 1;
      return v;
    }

    function deglitch(r0s, medianWin, spikeTh, jumpTh) {
      if (!r0s.length) return [];
      if (r0s.length < 3) return [...r0s];
      let win = Math.max(3, Number.parseInt(medianWin, 10) || DEFAULTS.medianWin);
      if (win % 2 === 0) win += 1;
      const half = Math.floor(win / 2);
      const out = [];
      let prevValid = Number(r0s[0]);

      for (let k = 0; k < r0s.length; k += 1) {
        const x = Number(r0s[k]);
        const a = Math.max(0, k - half);
        const b = Math.min(r0s.length, k + half + 1);
        const local = r0s.slice(a, b).map(Number).sort((p, q) => p - q);
        const med = local[Math.floor(local.length / 2)];
        const spikeFlag = Math.abs(x - med) > spikeTh;
        const jumpFlag = Math.abs(x - prevValid) > jumpTh && Math.abs(med - prevValid) <= spikeTh;
        const y = spikeFlag || jumpFlag ? med : x;
        out.push(y);
        prevValid = y;
      }
      return out;
    }

    function applyRule01(values, threshold, enabled) {
      const out = [...values];
      const changed = new Array(values.length).fill(false);
      if (!enabled || out.length < 2) return { values: out, changed };

      const th = Number.isFinite(threshold) ? threshold : DEFAULTS.ruleBaseRangeTh;
      for (let k = 0; k < out.length - 1; k += 1) {
        const oldR0 = out[k];
        const newR0 = out[k + 1];
        if (Number.isFinite(oldR0) && Number.isFinite(newR0) && newR0 >= th) {
          out[k + 1] = oldR0;
          changed[k + 1] = true;
        }
      }
      return { values: out, changed };
    }

    function elapsedHms(fn) {
      const frameMs = Number(els.frameMs.value) || DEFAULTS.frameMs;
      let totalSec = Math.round((fn - state.firstFn) * frameMs / 1000);
      if (totalSec < 0) totalSec = 0;
      const hh = Math.floor(totalSec / 3600);
      const mm = Math.floor((totalSec % 3600) / 60);
      const ss = totalSec % 60;
      return [hh, mm, ss].map((v) => String(v).padStart(2, "0")).join(":");
    }

    function loadText(text, fileName, format) {
      setFormat(format || state.format);
      state.fileName = fileName || "";
      state.records = state.format === "CSV" ? parseCsv(text) : parseLog(text);
      state.selectedFn = null;
      state.selectedRatio = 0.5;

      if (!state.records.length) throw new Error("No valid records found.");
      state.firstFn = state.records[0].fn;
      state.lastFn = state.records[state.records.length - 1].fn;
      els.windowSize.value = String(Math.max(10, state.records.length));
      syncStartControls(state.firstFn);
      updateInfo();
      draw();
    }

    function syncStartControls(nextValue) {
      if (!state.records.length) return;
      const n = Math.max(10, Number.parseInt(els.windowSize.value, 10) || 10);
      const maxStart = Math.max(state.firstFn, state.lastFn - n + 1);
      let value = nextValue === undefined ? Number.parseInt(els.startFn.value, 10) : Number.parseInt(nextValue, 10);
      if (!Number.isFinite(value)) value = state.firstFn;
      value = Math.max(state.firstFn, Math.min(maxStart, value));
      els.startFn.min = String(state.firstFn);
      els.startFn.max = String(maxStart);
      els.startFn.value = String(value);
      els.startSlider.min = String(state.firstFn);
      els.startSlider.max = String(maxStart);
      els.startSlider.value = String(value);
    }

    function updateInfo() {
      if (!state.records.length) {
        els.infoBox.textContent = "No file loaded.";
        return;
      }
      const p = state.parseInfo;
      els.infoBox.innerHTML = [
        `<strong>${escapeHtml(state.fileName || "dataset")}</strong>`,
        `Format: ${p.mode}`,
        `Records: ${state.records.length}`,
        `fn: ${state.firstFn} .. ${state.lastFn}`,
        `Columns: fn=${p.fn_key}, r0=${p.r0_key}, r1=${p.r1_key}, r2=${p.r2_key}`
      ].join("<br>");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    function resizeCanvas() {
      const rect = els.canvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      els.canvas.width = Math.max(320, Math.floor(rect.width * dpr));
      els.canvas.height = Math.max(320, Math.floor(rect.height * dpr));
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function xToPx(fn) {
      return plotBox.left + (fn - plotBox.xMin) / (plotBox.xMax - plotBox.xMin || 1) * plotBox.width;
    }

    function yToPx(y) {
      return plotBox.top + (plotBox.yMax - y) / (plotBox.yMax - plotBox.yMin || 1) * plotBox.height;
    }

    function drawLine(points, color, width) {
      if (!points.length) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      points.forEach((p, i) => {
        const x = xToPx(p.fn);
        const y = yToPx(p.y);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.fillStyle = color;
      const stride = Math.max(1, Math.floor(points.length / 1800));
      for (let i = 0; i < points.length; i += stride) {
        const p = points[i];
        ctx.beginPath();
        ctx.arc(xToPx(p.fn), yToPx(p.y), 1.7, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawMarkers(points, color, radius) {
      if (!points.length) return;
      ctx.fillStyle = color;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 1.2;
      for (const p of points) {
        ctx.beginPath();
        ctx.arc(xToPx(p.fn), yToPx(p.y), radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
    }

    function drawLabel(text, x, y, fill, stroke) {
      const lines = text.split("\n");
      ctx.font = "12px Arial";
      const w = Math.max(...lines.map((line) => ctx.measureText(line).width)) + 12;
      const h = lines.length * 15 + 8;
      const bx = Math.min(Math.max(8, x), els.canvas.clientWidth - w - 8);
      const by = Math.min(Math.max(8, y), els.canvas.clientHeight - h - 8);
      ctx.fillStyle = fill;
      ctx.strokeStyle = stroke || "#9aa4b2";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(bx, by, w, h, 4);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#17202a";
      lines.forEach((line, i) => ctx.fillText(line, bx + 6, by + 17 + i * 15));
    }

    function drawAxes(selected) {
      ctx.clearRect(0, 0, els.canvas.clientWidth, els.canvas.clientHeight);
      const w = els.canvas.clientWidth;
      const h = els.canvas.clientHeight;
      plotBox = {
        left: 62,
        top: 54,
        width: Math.max(120, w - 92),
        height: Math.max(120, h - 112),
        xMin: selected[0]?.fn ?? 0,
        xMax: selected[selected.length - 1]?.fn ?? 1,
        yMin: 0,
        yMax: 2
      };

      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#d7dde5";
      ctx.lineWidth = 1;
      ctx.strokeRect(plotBox.left, plotBox.top, plotBox.width, plotBox.height);

      ctx.font = "12px Arial";
      ctx.fillStyle = "#667085";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i += 1) {
        const yVal = i * 0.5;
        const y = yToPx(yVal);
        ctx.strokeStyle = "#edf0f4";
        ctx.beginPath();
        ctx.moveTo(plotBox.left, y);
        ctx.lineTo(plotBox.left + plotBox.width, y);
        ctx.stroke();
        ctx.fillText(yVal.toFixed(1), plotBox.left - 8, y);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      const frameMs = Number(els.frameMs.value) || DEFAULTS.frameMs;
      for (let i = 0; i <= 5; i += 1) {
        const fn = Math.round(plotBox.xMin + (plotBox.xMax - plotBox.xMin) * i / 5);
        const x = xToPx(fn);
        ctx.strokeStyle = "#edf0f4";
        ctx.beginPath();
        ctx.moveTo(x, plotBox.top);
        ctx.lineTo(x, plotBox.top + plotBox.height);
        ctx.stroke();
        ctx.fillStyle = "#667085";
        ctx.fillText(String(fn), x, plotBox.top + plotBox.height + 8);
        const elapsedMin = (fn - state.firstFn) * frameMs / 1000 / 60;
        ctx.fillText(elapsedMin.toFixed(2), x, 25);
      }

      ctx.fillStyle = "#17202a";
      ctx.font = "13px Arial";
      ctx.fillText("elapsed time from first fn / min", plotBox.left + plotBox.width / 2, 7);
      ctx.fillText("frame number fn", plotBox.left + plotBox.width / 2, plotBox.top + plotBox.height + 30);

      ctx.save();
      ctx.translate(18, plotBox.top + plotBox.height / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText("range r / meter", 0, 0);
      ctx.restore();
    }

    function draw() {
      resizeCanvas();
      if (!state.records.length) {
        ctx.clearRect(0, 0, els.canvas.clientWidth, els.canvas.clientHeight);
        els.status.textContent = "Ready.";
        return;
      }

      const median = forceOddMedianWin(els.medianWin.value);
      els.medianWin.value = String(median);
      syncStartControls();
      const startFn = Number.parseInt(els.startFn.value, 10);
      const n = Math.max(10, Number.parseInt(els.windowSize.value, 10) || 10);
      const endFn = startFn + n - 1;
      const selected = state.records.filter((r) => r.fn >= startFn && r.fn <= endFn);
      state.current.records = selected;

      if (!selected.length) {
        drawAxes([{ fn: startFn }, { fn: endFn }]);
        els.status.textContent = `No data in selected window: fn ${startFn} .. ${endFn}`;
        return;
      }

      const fns = selected.map((r) => r.fn);
      const r0s = selected.map((r) => r.r0);
      const baseDeg = deglitch(r0s, median, Number(els.spikeTh.value), Number(els.jumpTh.value));
      const ruleTh = Number(els.ruleBaseRangeTh.value) || DEFAULTS.ruleBaseRangeTh;
      const rule01 = applyRule01(baseDeg, ruleTh, els.enableRule01.checked);
      const deg = rule01.values;
      state.current = { records: selected, fns, r0s, deg };

      drawAxes(selected);
      drawLine(selected.map((r) => ({ fn: r.fn, y: r.r0 })), "#1f64d1", 1.2);
      drawLine(selected.map((r, i) => ({ fn: r.fn, y: deg[i] })), "#cf2e2e", 1.6);
      drawMarkers(selected
        .map((r, i) => rule01.changed[i] ? { fn: r.fn, y: deg[i] } : null)
        .filter(Boolean), "#16803c", 4.5);
      if (els.showR1.checked && selected.some((r) => r.r1 !== null)) {
        drawLine(selected.filter((r) => r.r1 !== null).map((r) => ({ fn: r.fn, y: r.r1 })), "#7c3aed", 1.1);
      }
      if (els.showR2.checked && selected.some((r) => r.r2 !== null)) {
        drawLine(selected.filter((r) => r.r2 !== null).map((r) => ({ fn: r.fn, y: r.r2 })), "#0891b2", 1.1);
      }

      const first = selected[0];
      const last = selected[selected.length - 1];
      for (const rec of [first, last]) {
        const tmin = (rec.fn - state.firstFn) * (Number(els.frameMs.value) || DEFAULTS.frameMs) / 1000 / 60;
        drawLabel(`fn=${rec.fn}\nt=${tmin.toFixed(3)}m\nr0=${rec.r0.toFixed(3)}`, xToPx(rec.fn) + 8, yToPx(rec.r0) + 8, "rgba(255,255,255,0.86)");
      }

      if (state.selectedFn !== null) {
        const idx = fns.indexOf(state.selectedFn);
        if (idx >= 0) {
          const rec = selected[idx];
          const x = xToPx(rec.fn);
          ctx.strokeStyle = "#16803c";
          ctx.setLineDash([5, 4]);
          ctx.beginPath();
          ctx.moveTo(x, plotBox.top);
          ctx.lineTo(x, plotBox.top + plotBox.height);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = "#1f64d1";
          ctx.beginPath();
          ctx.arc(x, yToPx(rec.r0), 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#cf2e2e";
          ctx.beginPath();
          ctx.arc(x, yToPx(deg[idx]), 4, 0, Math.PI * 2);
          ctx.fill();
          drawLabel(`fn=${rec.fn}\nt=${elapsedHms(rec.fn)}\nr0=${rec.r0.toFixed(3)}`, x + 12, yToPx(rec.r0) + 14, "#fff9c4", "#17202a");
        }
      }

      const frameMs = Number(els.frameMs.value) || DEFAULTS.frameMs;
      const elapsedStartMin = (startFn - state.firstFn) * frameMs / 1000 / 60;
      const elapsedEndMin = (fns[fns.length - 1] - state.firstFn) * frameMs / 1000 / 60;
      const ruleCount = rule01.changed.filter(Boolean).length;
      let status = `Plot OK | start_fn=${startFn}, window=${n}, records=${selected.length}, median_win=${median}, spike_TH=${Number(els.spikeTh.value).toFixed(3)}m, jump_TH=${Number(els.jumpTh.value).toFixed(3)}m, rule01=${els.enableRule01.checked ? "on" : "off"}, rule_TH=${ruleTh.toFixed(2)}m, rule_hits=${ruleCount}, time=${elapsedStartMin.toFixed(3)}..${elapsedEndMin.toFixed(3)} min`;
      if (state.selectedFn !== null && fns.includes(state.selectedFn)) {
        const rec = selected[fns.indexOf(state.selectedFn)];
        status += ` | selected fn=${rec.fn}, t=${elapsedHms(rec.fn)}, r0=${rec.r0.toFixed(3)}`;
      }
      els.status.textContent = status;
    }

    function nearestPoint(clientX, clientY) {
      if (!plotBox || !state.current.fns.length) return null;
      const rect = els.canvas.getBoundingClientRect();
      const ex = clientX - rect.left;
      const ey = clientY - rect.top;
      let best = null;
      let bestD2 = Infinity;
      state.current.records.forEach((rec) => {
        const dx = xToPx(rec.fn) - ex;
        const dy = yToPx(rec.r0) - ey;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestD2) {
          bestD2 = d2;
          best = rec;
        }
      });
      return bestD2 <= 12 * 12 ? best : null;
    }

    els.fmtLog.addEventListener("click", () => setFormat("LOG"));
    els.fmtCsv.addEventListener("click", () => setFormat("CSV"));

    els.sourceLocal.addEventListener("click", () => {
      setSource("local");
      els.sourceHint.textContent = "Choose one or more files from this PC.";
      els.fileInput.click();
    });

    els.sourceRepo.addEventListener("click", () => fetchRepoFiles(true));

    els.sourceDropbox.addEventListener("click", async () => {
      setSource("dropbox");
      if (!els.dropboxLinks.value.trim()) {
        els.dropboxLinks.value = DEFAULTS.dropboxUrl;
      }
      els.sourceHint.textContent = "";
      await listDropboxFiles(true);
    });

    els.openAlgorithm.addEventListener("click", () => {
      window.open("A1886_GEP_algorithm_summary_v01.html", "_blank", "noopener");
    });

    els.dropboxLinks.addEventListener("paste", scheduleDropboxLoad);
    els.dropboxLinks.addEventListener("change", scheduleDropboxLoad);
    els.dropboxLinks.addEventListener("input", scheduleDropboxLoad);

    els.fileInput.addEventListener("change", async () => {
      const files = Array.from(els.fileInput.files || []).filter((file) => isDatasetName(file.name));
      setListedFiles(files.map((file) => ({
        name: file.name,
        file,
        format: extFormat(file.name),
        source: "local"
      })), `${files.length} local files listed. Select one to show curve.`);
      if (files.length) await openSelectedFile();
    });

    async function openSelectedFile() {
      const index = Number.parseInt(els.fileSelect.value, 10);
      const item = state.listedFiles[index];
      if (!item) {
        els.status.textContent = "No file selected.";
        return;
      }
      try {
        if (item.file) {
          loadText(await item.file.text(), item.name, item.format || extFormat(item.name));
        } else {
          loadText(await fetchTextFromUrl(item.url, item.source), item.name, item.format || extFormat(item.name));
        }
      } catch (err) {
        state.records = [];
        updateInfo();
        draw();
        const sourceNote = item.source === "dropbox"
          ? " Dropbox can block browser reads for some shared links; download the file and use Local file if this persists."
          : "";
        els.status.textContent = `[ERROR] parse failed: ${item.name}: ${err.message}.${sourceNote}`;
      }
    }

    els.fileSelect.addEventListener("change", openSelectedFile);

    for (const el of [els.windowSize, els.startFn, els.frameMs, els.medianWin, els.spikeTh, els.jumpTh, els.showR1, els.showR2, els.enableRule01]) {
      el.addEventListener("input", draw);
      el.addEventListener("change", draw);
    }

    els.startSlider.addEventListener("input", () => {
      els.startFn.value = els.startSlider.value;
      draw();
    });

    els.ruleBaseRangeTh.addEventListener("input", () => {
      els.ruleBaseRangeSlider.value = els.ruleBaseRangeTh.value;
      draw();
    });

    els.ruleBaseRangeSlider.addEventListener("input", () => {
      els.ruleBaseRangeTh.value = Number(els.ruleBaseRangeSlider.value).toFixed(2);
      draw();
    });

    els.canvas.addEventListener("click", (event) => {
      const rec = nearestPoint(event.clientX, event.clientY);
      if (!rec) return;
      state.selectedFn = rec.fn;
      const startFn = Number.parseInt(els.startFn.value, 10);
      const n = Math.max(1, Number.parseInt(els.windowSize.value, 10) || 1);
      state.selectedRatio = Math.max(0, Math.min(1, (rec.fn - startFn) / Math.max(1, n - 1)));
      draw();
    });

    els.canvas.addEventListener("wheel", (event) => {
      if (!state.records.length) return;
      event.preventDefault();
      const oldN = Math.max(10, Number.parseInt(els.windowSize.value, 10) || 10);
      let newN = Math.round(oldN * (event.deltaY < 0 ? DEFAULTS.zoomIn : DEFAULTS.zoomOut));
      newN = Math.max(10, Math.min(100000, newN));
      newN = Math.min(newN, Math.max(10, state.records.length));
      if (newN === oldN) return;
      const anchorFn = state.selectedFn !== null ? state.selectedFn : Number.parseInt(els.startFn.value, 10) + Math.floor(oldN / 2);
      const ratio = state.selectedFn !== null ? state.selectedRatio : 0.5;
      const newStart = Math.round(anchorFn - ratio * Math.max(1, newN - 1));
      els.windowSize.value = String(newN);
      syncStartControls(newStart);
      draw();
    }, { passive: false });

    window.addEventListener("resize", draw);
    setFormat("CSV");
    fetchRepoFiles(true).then(() => draw());
  </script>
</body>
</html>
