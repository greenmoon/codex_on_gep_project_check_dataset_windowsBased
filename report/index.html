  <style>
    :root {

      --line: #d7dde5;
      --focus: #0d9488;
    }

    * {

      line-height: 1.2;
    }

      color: var(--muted);
    }

    .file-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    a {
      color: var(--focus);
      text-decoration: none;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    a:hover {
      text-decoration: underline;
    }

    .item {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
    }

    .kind {
      display: block;
      margin-top: 4px;
      color: var(--muted);
